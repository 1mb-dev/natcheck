# coturn config for natcheck filtering classification (RFC 5780 §4.4).
# Diagnostic-test posture: no auth, no TLS, no DTLS. NOT a production STUN
# service. For production hardening, refer to coturn's own README.
#
# Setup + per-provider topology requirements: see docs/coturn-setup.md.

listening-port=3478
alt-listening-port=3479

# coturn requires TWO distinct routable IPs to honor CHANGE_REQUEST. With
# one IP it logs "WARNING: ... only one IP address is provided" and natcheck
# reports filtering: untested. AWS/GCP: PUBLIC and PRIVATE NIC IPs differ
# naturally — fill in both. DO basic droplet, Linode Nanode, Hetzner single-IP:
# add a second routable IP from the provider, alias it to eth0 with
# `ip addr add SECOND_IP/32 dev eth0`, fill in both here.
listening-ip=YOUR_FIRST_IP
listening-ip=YOUR_SECOND_IP
external-ip=YOUR_FIRST_IP/YOUR_FIRST_IP
external-ip=YOUR_SECOND_IP/YOUR_SECOND_IP

# Required on coturn 4.10+ (RFC 5780 default flipped to OFF). Cosmetic "Bad
# configuration format" warning on 4.5/4.6 (Ubuntu 24.04 apt) — harmless,
# keep for forward compat.
rfc5780

no-auth
no-tls
no-dtls

# Explicit so logs stream to stdout. Without this, coturn 4.5/4.6 detects
# non-TTY stdout and writes only to PID-named /var/log/turn_<pid>_<date>.log
# files — fragmented and hard to grep.
log-file=stdout
